<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="380" height="92" viewBox="0 30 380 92">
  <!-- fp8 e4m3: 1 sign, 4 exponent, 3 mantissa -->

  <rect x="32" y="38" width="34" height="44" rx="6" fill="#eccccc"/>
  <rect x="72" y="38" width="120" height="44" rx="6" fill="#cfe6cf"/>
  <rect x="198" y="38" width="100" height="44" rx="6" fill="#ccd4ea"/>

  <g font-family="'Menlo','Courier New',monospace" font-weight="700" font-size="30" fill="#3a3a3a" text-anchor="middle">
    <text x="49" y="71">0</text>
    <text x="132" y="71">1001</text>
    <text x="248" y="71">101</text>
  </g>

  <g font-family="'Menlo','Courier New',monospace" font-size="17">
    <text x="49" y="106" fill="#cf6b6b" text-anchor="middle">sign</text>
    <text x="132" y="106" fill="#6fa86f" text-anchor="middle">exponent</text>
    <text x="248" y="106" fill="#6c7ec9" text-anchor="middle">significand</text>
  </g>
</svg>
